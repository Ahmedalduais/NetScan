name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform windows/amd64 -o NetScan.exe
      - uses: actions/upload-artifact@v4
        with:
          name: NetScan-Windows
          path: build/bin/NetScan.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: sudo apt-get update && sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform linux/amd64 -o netscan
      - uses: actions/upload-artifact@v4
        with:
          name: NetScan-Linux
          path: build/bin/netscan

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform darwin/amd64 -o NetScan-Intel.app
      - run: wails build -platform darwin/arm64 -o NetScan-Silicon.app
      - uses: actions/upload-artifact@v4
        with:
          name: NetScan-macOS
          path: |
            build/bin/NetScan-Intel.app
            build/bin/NetScan-Silicon.app

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir release
          cp NetScan-Windows/NetScan.exe release/
          cp NetScan-Linux/netscan release/
          cp -r NetScan-macOS/* release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
