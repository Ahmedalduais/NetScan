name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform windows/amd64 -o NetScan.exe
      - run: Copy-Item build/bin/NetScan.exe NetScan.exe
      - uses: actions/upload-artifact@v4
        with:
          name: NetScan-Windows
          path: NetScan.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe multiverse
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev
          sudo apt-get install -y libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform linux/amd64 -o netscan
      - run: cp build/bin/netscan netscan
      - uses: actions/upload-artifact@v4
        with:
          name: NetScan-Linux
          path: netscan

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir release
          cp NetScan-Windows/NetScan.exe release/
          cp NetScan-Linux/netscan release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
